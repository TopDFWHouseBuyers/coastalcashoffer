name: Generate Blog Post

on:
  schedule:
    - cron: '0 14 * * 1'   # Monday 8am CT
    - cron: '0 14 * * 3'   # Wednesday 8am CT
    - cron: '0 14 * * 5'   # Friday 8am CT
    - cron: '0 14 * * 6'   # Saturday 8am CT
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_post.py
      - run: python scripts/generate_sitemap.py
      - run: |
          git config --global user.name "Coastal Cash Offer Bot"
          git config --global user.email "bot@coastalcashoffer.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: New blog post $(date '+%A %B %d %Y')"
          git push
